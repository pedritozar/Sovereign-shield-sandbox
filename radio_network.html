// ============ SPRINT 8 - RADIO: INICIALIZACIÓN DEL CANVAS ============
function srnInitCanvas() {
  var canvas = document.getElementById('srn-canvas');
  if (!canvas) return;
  srnCanvasCtx = canvas.getContext('2d');
  // Ajustar resolución para pantallas retina
  var dpr = window.devicePixelRatio || 1;
  canvas.width = 340 * dpr;
  canvas.height = 48 * dpr;
  canvas.style.width = '340px';
  canvas.style.height = '48px';
  srnCanvasCtx.scale(dpr, dpr);
}

// ============ SPRINT 8 - RADIO: TOGGLE DEL PANEL ============
function srnTogglePanel() {
  srnPanelOpen = !srnPanelOpen;
  var panel = document.getElementById('srn-panel');
  if (panel) {
    if (srnPanelOpen) {
      panel.classList.add('visible');
    } else {
      panel.classList.remove('visible');
    }
  }
}

// ============ SPRINT 8 - RADIO: INICIALIZAR AUDIO CONTEXT ============

    var AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) {
      if (typeof agregarEvento === 'function') {
        agregarEvento('⚠ SRN: Web Audio API no soportada en este navegador', 'info');
      }
      return false;

    srnAudioCtx = new AudioCtx();

    srnMasterGain.gain.value = srnVolume;

    // Nodo de música gain (para ducking independiente)
    srnMusicGain = srnAudioCtx.createGain();
    srnMusicGain.gain.value = 1.0;

    // Analizador para visualización
    srnAnalyser = srnAudioCtx.createAnalyser();
    srnAnalyser.fftSize = 256;
    srnAnalyser.smoothingTimeConstant = 0.8;
    srnAnalyserData = new Uint8Array(srnAnalyser.frequencyBinCount);

    // Cadena de señal: osciladores → musicGain → analyser → masterGain → destino
    srnMusicGain.connect(srnAnalyser);
    srnAnalyser.connect(srnMasterGain);
    srnMasterGain.connect(srnAudioCtx.destination);

    // Precalcular buffer de ruido blanco (2 segundos)
    srnNoiseBuffer = srnCrearBufferRuido(2.0);

    return true;
  } catch (e) {
    if (typeof agregarEvento === 'function') {
      agregarEvento('⚠ SRN: Error al inicializar AudioContext — ' + e.message, 'info');
    }
    return false;
  }
}

// ============ SPRINT 8 - RADIO: CREAR BUFFER DE RUIDO BLANCO ============
function srnCrearBufferRuido(duracion) {
  if (!srnAudioCtx) return null;
  var sampleRate = srnAudioCtx.sampleRate;
  var frameCount = Math.floor(sampleRate * duracion);
  var buffer = srnAudioCtx.createBuffer(1, frameCount, sampleRate);
  var data = buffer.getChannelData(0);
  for (var i = 0; i < frameCount; i++) {
    data[i] = (Math.random() * 2 - 1) * 0.3; // Ruido blanco atenuado
  }
  return buffer;
}

// ============ SPRINT 8 - RADIO: CREAR SYNTH WAVE ============
function srnCrearSynthwave() {
  if (!srnAudioCtx || !srnMusicGain) return;

  // Limpiar osciladores anteriores
  srnDetenerOsciladores();

  // --- PAD SYNTHWAVE: 3 osciladores detuneados ---
  var freqBase = SRN_NOTAS[2]; // La3 ≈ 175 Hz como raíz del pad

  // Oscilador 1: sawtooth suavizado
  var osc1 = srnAudioCtx.createOscillator();
  var osc1Gain = srnAudioCtx.createGain();
  var osc1Filter = srnAudioCtx.createBiquadFilter();
  osc1.type = 'sawtooth';
  osc1.frequency.value = freqBase;
  osc1.detune.value = 0;
  osc1Filter.type = 'lowpass';
  osc1Filter.frequency.value = 800;
  osc1Filter.Q.value = 2;
  osc1Gain.gain.value = 0.08;
  osc1.connect(osc1Filter);
  osc1Filter.connect(osc1Gain);
  osc1Gain.connect(srnMusicGain);
  osc1.start();

  // Oscilador 2: square detuneado +7 cents
  var osc2 = srnAudioCtx.createOscillator();
  var osc2Gain = srnAudioCtx.createGain();
  var osc2Filter = srnAudioCtx.createBiquadFilter();
  osc2.type = 'square';
  osc2.frequency.value = freqBase * 1.5; // Quinta justa
  osc2.detune.value = 7;
  osc2Filter.type = 'lowpass';
  osc2Filter.frequency.value = 600;
  osc2Filter.Q.value = 1;
  osc2Gain.gain.value = 0.04;
  osc2.connect(osc2Filter);
  osc2Filter.connect(osc2Gain);
  osc2Gain.connect(srnMusicGain);
  osc2.start();

  // Oscilador 3: sine sub-bass
  var osc3 = srnAudioCtx.createOscillator();
  var osc3Gain = srnAudioCtx.createGain();
  osc3.type = 'sine';
  osc3.frequency.value = SRN_NOTAS_BAJO[2]; // Nota de bajo ~44 Hz
  osc3Gain.gain.value = 0.12;
  osc3.connect(osc3Gain);
  osc3Gain.connect(srnMusicGain);
  osc3.start();

  // Oscilador 4: triangle para atmósfera
  var osc4 = srnAudioCtx.createOscillator();
  var osc4Gain = srnAudioCtx.createGain();
  osc4.type = 'triangle';
  osc4.frequency.value = freqBase * 2; // Octava superior
  osc4.detune.value = -5;
  osc4Gain.gain.value = 0.03;
  osc4.connect(osc4Gain);
  osc4Gain.connect(srnMusicGain);
  osc4.start();

  // Guardar referencias para detener después
  srnOscNodes = [
    { osc: osc1, gain: osc1Gain },
    { osc: osc2, gain: osc2Gain },
    { osc: osc3, gain: osc3Gain },
    { osc: osc4, gain: osc4Gain }
  ];

  // Iniciar arpegio
  srnIniciarArpegio();
}

// ============ SPRINT 8 - RADIO: ARPEGIO RÍTMICO ============
function srnIniciarArpegio() {
  if (srnArpInterval) clearInterval(srnArpInterval);
  srnArpStep = 0;
  srnArpInterval = setInterval(function() {
    if (!srnPlaying || !srnAudioCtx || srnOscNodes.length === 0) return;
    // Crear una nota corta de arpegio
    var freqIdx = SRN_ARPEGGIO[srnArpStep % SRN_ARPEGGIO.length];
    var freq = SRN_NOTAS[freqIdx];
    var arpOsc = srnAudioCtx.createOscillator();
    var arpGain = srnAudioCtx.createGain();
    var arpFilter = srnAudioCtx.createBiquadFilter();
    arpOsc.type = 'square';
    arpOsc.frequency.value = freq * 2; // Octava alta
    arpFilter.type = 'bandpass';
    arpFilter.frequency.value = freq * 2;
    arpFilter.Q.value = 5;
    arpGain.gain.setValueAtTime(0.0, srnAudioCtx.currentTime);
    arpGain.gain.linearRampToValueAtTime(0.05, srnAudioCtx.currentTime + 0.01);
    arpGain.gain.exponentialRampToValueAtTime(0.001, srnAudioCtx.currentTime + 0.18);
    arpOsc.connect(arpFilter);
    arpFilter.connect(arpGain);
    arpGain.connect(srnMusicGain);
    arpOsc.start();
    arpOsc.stop(srnAudioCtx.currentTime + 0.2);
    srnArpStep++;
  }, 280); // 280ms entre notas ~ 107 BPM
}

// ============ SPRINT 8 - RADIO: DETENER OSCILADORES ============
function srnDetenerOsciladores() {
  if (srnArpInterval) { clearInterval(srnArpInterval); srnArpInterval = null; }
  for (var i = 0; i < srnOscNodes.length; i++) {
    try {
      srnOscNodes[i].osc.stop();
      srnOscNodes[i].osc.disconnect();
      srnOscNodes[i].gain.disconnect();
    } catch (e) { /* ya detenido */ }
  }
  srnOscNodes = [];
}

// ============ SPRINT 8 - RADIO: TOGGLE PLAY/PAUSE ============
function srnTogglePlay() {
  if (!srnInitAudio()) return;

  // Reanudar contexto si estaba suspendido (política de autoplay)
  if (srnAudioCtx.state === 'suspended') {
    srnAudioCtx.resume();
  }

  if (srnPlaying) {
    // Pausar: fade out y detener osciladores
    srnPlaying = false;
    srnMusicGain.gain.setTargetAtTime(0, srnAudioCtx.currentTime, 0.3);
    setTimeout(function() {
      srnDetenerOsciladores();
    }, 500);
    document.getElementById('srn-play-btn').textContent = '▶ PLAY';
    document.getElementById('srn-play-btn').classList.remove('active');
    document.getElementById('srn-status-dot').classList.add('off');
    document.getElementById('srn-status-left').textContent = 'SEÑAL: PAUSADA';
    document.getElementById('srn-mode-label').textContent = 'STANDBY';
    if (typeof agregarEvento === 'function') {
      agregarEvento('◈ SRN: Transmisión de audio detenida', 'info');
    }
  } else {
    // Iniciar reproducción
    srnPlaying = true;
    srnMusicGain.gain.setValueAtTime(0, srnAudioCtx.currentTime);
    srnCrearSynthwave();
    srnMusicGain.gain.setTargetAtTime(1.0, srnAudioCtx.currentTime, 0.5);
    document.getElementById('srn-play-btn').textContent = '⏸ PAUSE';
    document.getElementById('srn-play-btn').classList.add('active');
    document.getElementById('srn-status-dot').classList.remove('off');
    document.getElementById('srn-status-left').textContent = 'SEÑAL: EN AIRE';
    document.getElementById('srn-mode-label').textContent = 'SYNTHWAVE';
    srnDrawWaveform();
    if (typeof agregarEvento === 'function') {
      agregarEvento('◈ SRN: Transmisión FM 87.3 MHz activa — modo synthwave', 'info');
    }
  }
}

// ============ SPRINT 8 - RADIO: TOGGLE MUTE ============
function srnToggleMute() {
  if (!srnAudioCtx || !srnMasterGain) return;
  srnMuted = !srnMuted;
  var muteBtn = document.getElementById('srn-mute-btn');
  if (srnMuted) {
    srnMasterGain.gain.setTargetAtTime(0, srnAudioCtx.currentTime, 0.1);
    if (muteBtn) { muteBtn.textContent = '🔊 UNMUTE'; muteBtn.classList.add('active'); }
  } else {
    srnMasterGain.gain.setTargetAtTime(srnVolume, srnAudioCtx.currentTime, 0.1);
    if (muteBtn) { muteBtn.textContent = '🔇 MUTE'; muteBtn.classList.remove('active'); }
  }
}

// ============ SPRINT 8 - RADIO: CONTROL DE VOLUMEN ============
function srnSetVolume(val) {
  srnVolume = parseFloat(val) / 100;
  var pctEl = document.getElementById('srn-vol-pct');
  if (pctEl) pctEl.textContent = Math.round(parseFloat(val)) + '%';
  if (srnAudioCtx && srnMasterGain && !srnMuted && !srnDuckingActive) {
    srnMasterGain.gain.setTargetAtTime(srnVolume, srnAudioCtx.currentTime, 0.05);
  }
}

// ============ SPRINT 8 - RADIO: DUCKING ============
// Baja el volumen de la música al 20% durante una transmisión importante
function srnDucking(duracion) {
  if (!srnAudioCtx || !srnMasterGain) return;
  srnDuckingActive = true;
  var volTarget = srnVolume * 0.20; // 20% del volumen actual
  srnMasterGain.gain.setTargetAtTime(volTarget, srnAudioCtx.currentTime, 0.3);
  if (srnDuckTimeout) clearTimeout(srnDuckTimeout);
  srnDuckTimeout = setTimeout(function() {
    // Restaurar volumen suavemente
    if (!srnMuted) {
      srnMasterGain.gain.setTargetAtTime(srnVolume, srnAudioCtx.currentTime, 0.8);
    }
    srnDuckingActive = false;
  }, duracion);
}

// ============ SPRINT 8 - RADIO: REPRODUCIR ESTÁTICA (ruido blanco corto) ============
function srnReproducirEstatica(duracion, volumen) {
  if (!srnAudioCtx) return;
  if (!srnNoiseBuffer) srnNoiseBuffer = srnCrearBufferRuido(2.0);
  if (!srnNoiseBuffer) return;
  var durMs = duracion || 500;
  var vol = parseFloat(volumen) || 0.3;
  var source = srnAudioCtx.createBufferSource();
  var noiseGain = srnAudioCtx.createGain();
  var noiseFilter = srnAudioCtx.createBiquadFilter();
  source.buffer = srnNoiseBuffer;
  source.loop = true;
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.value = 2000;
  noiseFilter.Q.value = 0.5;
  noiseGain.gain.setValueAtTime(0, srnAudioCtx.currentTime);
  noiseGain.gain.linearRampToValueAtTime(vol, srnAudioCtx.currentTime + 0.05);
  noiseGain.gain.setValueAtTime(vol, srnAudioCtx.currentTime + (durMs / 1000) - 0.1);
  noiseGain.gain.linearRampToValueAtTime(0, srnAudioCtx.currentTime + durMs / 1000);
  source.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(srnMasterGain);
  source.start();
  source.stop(srnAudioCtx.currentTime + durMs / 1000 + 0.1);
}

// ============ SPRINT 8 - RADIO: REPRODUCIR BEEP (tono de anuncio) ============
function srnReproducirBeep() {
  if (!srnAudioCtx) return;
  var beep = srnAudioCtx.createOscillator();
  var beepGain = srnAudioCtx.createGain();
  beep.type = 'sine';
  beep.frequency.value = 1000;
  beepGain.gain.setValueAtTime(0, srnAudioCtx.currentTime);
  beepGain.gain.linearRampToValueAtTime(0.15, srnAudioCtx.currentTime + 0.01);
  beepGain.gain.setValueAtTime(0.15, srnAudioCtx.currentTime + 0.08);
  beepGain.gain.linearRampToValueAtTime(0, srnAudioCtx.currentTime + 0.12);
  beep.connect(beepGain);
  beepGain.connect(srnMasterGain);
  beep.start();
  beep.stop(srnAudioCtx.currentTime + 0.15);
  // Segundo beep
  var beep2 = srnAudioCtx.createOscillator();
  var beep2Gain = srnAudioCtx.createGain();
  beep2.type = 'sine';
  beep2.frequency.value = 1200;
  beep2Gain.gain.setValueAtTime(0, srnAudioCtx.currentTime + 0.18);
  beep2Gain.gain.linearRampToValueAtTime(0.15, srnAudioCtx.currentTime + 0.20);
  beep2Gain.gain.setValueAtTime(0.15, srnAudioCtx.currentTime + 0.30);
  beep2Gain.gain.linearRampToValueAtTime(0, srnAudioCtx.currentTime + 0.35);
  beep2.connect(beep2Gain);
  beep2Gain.connect(srnMasterGain);
  beep2.start(srnAudioCtx.currentTime + 0.18);
  beep2.stop(srnAudioCtx.currentTime + 0.4);
}

// ============ SPRINT 8 - RADIO: GENERAR BOLETÍN ECONÓMICO (Claude Haiku) ============
function srnGenerarBoletin() {
  if (srnBoletinCooldown) {
    var cdEl = document.getElementById('srn-boletin-cd');
    if (cdEl) cdEl.textContent = '⌛ En cooldown...';
    return;
  }

  var apiKey = localStorage.getItem('ss_anthropic_key');
  if (!apiKey) {
    srnMostrarEnOutput('srn-boletin-output', '⚠ ERROR: Clave API no encontrada.\nConfigurá ss_anthropic_key en localStorage.', 'red');
    return;
  }

  // Obtener estado de Firebase
  var estado = srnObtenerEstadoFirebase();

  // Inicializar audio si no está activo (para ducking)
  if (!srnAudioCtx) srnInitAudio();

  // Ducking durante el boletín
  if (srnPlaying) srnDucking(8000);

  // Beep de inicio
  if (srnAudioCtx) srnReproducirBeep();

  srnMostrarEnOutput('srn-boletin-output', '▣ CONECTANDO CON CENTRAL... GENERANDO BOLETÍN...', 'green');

  // Activar cooldown
  srnBoletinCooldown = true;
  srnIniciarCooldown('srn-boletin-cd', 15, function() { srnBoletinCooldown = false; });

  var prompt = 'Sos el locutor de "Sovereign Radio Network", una radio estatal satírica de un gobierno ficticio en crisis. ' +
    'Generá UN boletín económico de máximo 2 líneas (tono paródico, dramático y sardónico). ' +
    'Estado actual del gobierno:\n' +
    '- Tesorería: $' + estado.tesoreria + '\n' +
    '- Nivel de gobierno: ' + estado.nivel + '\n' +
    '- Trimestre: ' + estado.trimestre + '\n' +
    '- Monedas acumuladas: ' + estado.monedas + '\n' +
    'Empezá con "BOLETÍN DE LAS [hora]:" seguido del contenido. Sin explicaciones adicionales.';

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'content-type': 'application/json'
    },
    body: JSON.stringify({
      model: 'claude-haiku-20240307',
      max_tokens: 120,
      messages: [{ role: 'user', content: prompt }]
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var texto = '';
    if (data && data.content && data.content[0] && data.content[0].text) {
      texto = data.content[0].text.trim();
    } else {
      texto = '⚠ ERROR EN TRANSMISIÓN — SEÑAL PERDIDA';
    }
    srnMostrarEnOutput('srn-boletin-output', texto, 'green');
    if (typeof agregarEvento === 'function') {
      agregarEvento('◈ SRN Boletín transmitido: ' + texto.substring(0, 60) + '...', 'info');
    }
    // Estática al final del boletín
    setTimeout(function() {
      if (srnAudioCtx) srnReproducirEstatica(300, 0.15);
    }, 4000);
  })
  .catch(function(e) {
    srnMostrarEnOutput('srn-boletin-output', '⚠ FALLA DE TRANSMISIÓN: ' + e.message, 'red');
    if (typeof agregarEvento === 'function') {
      agregarEvento('◈ SRN: Error en boletín — ' + e.message, 'info');
    }
  });
}

// ============ SPRINT 8 - RADIO: SCANNER DE FRECUENCIAS CIVILES ============

// ============ SPRINT 8 - RADIO: NÚMEROS ESTACIÓN ============
function srnGenerarNumeros() {
  if (!srnAudioCtx) srnInitAudio();

  // Estática corta de inicio
  if (srnAudioCtx) srnReproducirEstatica(200, 0.15);

  // Generar secuencia de números aleatoria (grupos de 2 dígitos)
  var grupos = [];
  for (var i = 0; i < 6; i++) {
    grupos.push(String(Math.floor(Math.random() * 89) + 10));
  }
  var secuencia = grupos.slice(0, 3).join(' ') + ' — ' + grupos.slice(3).join(' ');

  // Seleccionar frase críptica aleatoria
  var frase = SRN_FRASES_CRIPTICAS[Math.floor(Math.random() * SRN_FRASES_CRIPTICAS.length)];

  // Seleccionar hint de mercado aleatorio
  var hint = SRN_MARKET_HINTS[Math.floor(Math.random() * SRN_MARKET_HINTS.length)];

  // Animación de "transmisión"
  var seqEl = document.getElementById('srn-numbers-seq');
  var phraseEl = document.getElementById('srn-numbers-phrase');
  var hintEl = document.getElementById('srn-numeros-hint');
  if (!seqEl || !phraseEl) return;

  seqEl.textContent = '.. .. ..';
  phraseEl.textContent = 'DESCIFRADO EN PROGRESO...';
  if (hintEl) hintEl.textContent = '';

  // Revelar secuencia en 3 pasos
  var pasoIdx = 0;
  var pasos = [
    grupos.slice(0, 2).join(' ') + ' .. — .. ..',
    grupos.slice(0, 3).join(' ') + ' — ' + grupos.slice(3, 5).join(' ') + ' ..',
    secuencia
  ];

  var revealInterval = setInterval(function() {
    if (pasoIdx < pasos.length) {
      seqEl.textContent = pasos[pasoIdx];
      // Beep por cada número revelado
      if (srnAudioCtx) {
        var beepReveal = srnAudioCtx.createOscillator();
        var gainReveal = srnAudioCtx.createGain();
        beepReveal.type = 'sine';
        beepReveal.frequency.value = 800 + (pasoIdx * 200);
        gainReveal.gain.setValueAtTime(0.08, srnAudioCtx.currentTime);
        gainReveal.gain.exponentialRampToValueAtTime(0.001, srnAudioCtx.currentTime + 0.06);
        beepReveal.connect(gainReveal);
        gainReveal.connect(srnMasterGain);
        beepReveal.start();
        beepReveal.stop(srnAudioCtx.currentTime + 0.07);
      }
      pasoIdx++;
    } else {
      clearInterval(revealInterval);
      phraseEl.textContent = frase;
      if (hintEl) {
        hintEl.innerHTML = '<span style="color:' + hint.color + ';">' + hint.msg + '</span>';
      }
      // Estática final
      if (srnAudioCtx) setTimeout(function() { srnReproducirEstatica(150, 0.1); }, 200);
      if (typeof agregarEvento === 'function') {
        agregarEvento('◈ SRN Números Estación: ' + secuencia + ' — ' + frase, 'info');
      }
    }
  }, 400);
}

// ============ SPRINT 8 - RADIO: INTERFERENCIA TÁCTICA ============
// Se activa cuando ocurre un evento de guerra
function srnActivarInterferencia(motivo) {
  if (!srnAudioCtx) srnInitAudio();

  // Activar overlay visual
  var overlay = document.getElementById('srn-interference-overlay');
  if (overlay) overlay.classList.add('active');

  // Distorsión del oscilador principal
  if (srnPlaying && srnOscNodes.length > 0) {
    // Detune brusco para efecto de interferencia
    try {
      for (var i = 0; i < srnOscNodes.length; i++) {
        if (srnOscNodes[i] && srnOscNodes[i].osc) {
          srnOscNodes[i].osc.detune.setValueAtTime(
            (Math.random() * 200 - 100),
            srnAudioCtx.currentTime
          );
        }
      }
    } catch (e) { /* osciladores ya detenidos */ }
  }

  // Estática intensa durante 3 segundos con variaciones
  if (srnAudioCtx) {
    srnReproducirEstatica(800, 0.5);
    setTimeout(function() { srnReproducirEstatica(400, 0.3); }, 900);
    setTimeout(function() { srnReproducirEstatica(600, 0.4); }, 1500);
    setTimeout(function() { srnReproducirEstatica(300, 0.2); }, 2300);
  }

  // Animar frecuencia errática
  var freqOrig = srnCurrentFreq;
  var errCount = 0;
  var errInterval = setInterval(function() {
    errCount++;
    srnCurrentFreq = parseFloat((Math.random() * 50 + 70).toFixed(2));
    srnActualizarDisplayFreq();
    if (errCount > 20) {
      clearInterval(errInterval);
      srnCurrentFreq = freqOrig;
      srnActualizarDisplayFreq();
      // Restaurar detune
      if (srnPlaying && srnOscNodes.length > 0) {
        try {
          srnOscNodes[0] && srnOscNodes[0].osc.detune.setTargetAtTime(0, srnAudioCtx.currentTime, 0.2);
          srnOscNodes[1] && srnOscNodes[1].osc.detune.setTargetAtTime(7, srnAudioCtx.currentTime, 0.2);
          srnOscNodes[2] && srnOscNodes[2].osc.detune.setTargetAtTime(0, srnAudioCtx.currentTime, 0.2);
          srnOscNodes[3] && srnOscNodes[3].osc.detune.setTargetAtTime(-5, srnAudioCtx.currentTime, 0.2);
        } catch (e) { /* ignorar */ }
      }
    }
  }, 150);

  // Cambiar nivel de señal a bajo durante interferencia
srnSignalLevel = 1;
srnActualizarBarrasSenial();
}

// ============ SPRINT 8 - RADIO: ACTUALIZAR BARRAS DE SEÑAL ============
function srnActualizarBarrasSenial() {
  var bars = document.querySelectorAll('.srn-signal-bar');
  if (!bars || bars.length === 0) return;
  for (var i = 0; i < bars.length; i++) {
    if (i < srnSignalLevel) {
      bars[i].classList.add('lit');
    } else {
      bars[i].classList.remove('lit');
    }
  }
}

// ============ SPRINT 8 - RADIO: FUNCIONES AUXILIARES FALTANTES ============
function srnActualizarDisplayFreq() {
  var el = document.getElementById('srn-freq-num');
  if (el) {
    el.textContent = srnCurrentFreq.toFixed(2);
  }
}

function srnMostrarEnOutput(id, texto, tipo) {
  var el = document.getElementById(id);
  if (!el) return;
  var color = '#e6edf3';
  if (tipo === 'green') color = '#238636';
  else if (tipo === 'red') color = '#f85149';
  else if (tipo === 'amber') color = '#e3b341';
  else if (tipo === 'blue') color = '#58a6ff';
  el.innerHTML = '<span style="color:' + color + ';">' + texto.replace(/\n/g, '<br>') + '</span>';
}

function srnIniciarCooldown(elementId, segundos, callback) {
  var el = document.getElementById(elementId);
  if (!el) return;
  var restante = segundos;
  el.textContent = '⌛ ' + restante + 's';
  var timer = setInterval(function() {
    restante--;
    if (restante <= 0) {
      clearInterval(timer);
      el.textContent = '';
      if (typeof callback === 'function') callback();
    } else {
      el.textContent = '⌛ ' + restante + 's';
    }
  }, 1000);
}

function srnObtenerEstadoFirebase() {
  var estado = { tesoreria: 'DESCONOCIDO', nivel: '?', trimestre: '?', monedas: 'N/A' };
  if (typeof dbRef !== 'undefined' && dbRef) {
    dbRef.child('partida/finanzas/tesoreria').once('value', function(snap) {
      estado.tesoreria = snap.val() || 0;
    });
    dbRef.child('partida/estado/nivel_actual').once('value', function(snap) {
      estado.nivel = snap.val() || 1;
    });
    dbRef.child('partida/tiempo/trimestre_actual').once('value', function(snap) {
      estado.trimestre = snap.val() || 1;
    });
    dbRef.child('partida/economia/monedas').once('value', function(snap) {
      var monedas = snap.val() || {};
      var resumen = [];
      var codes = ['EUR','GBP','CAD','JPY','RUB','CNY'];
      for (var i = 0; i < codes.length; i++) {
        if (monedas[codes[i]]) {
          resumen.push(codes[i] + ':' + monedas[codes[i]].valor_relativo.toFixed(1));
        }
      }
      estado.monedas = resumen.join(' ') || 'N/A';
    });
  }
  return estado;
}

// Visualizador de onda (idle)
function srnDrawWaveformIdle() {
  if (!srnCanvasCtx) return;
  var canvas = document.getElementById('srn-canvas');
  if (!canvas) return;
  var ctx = srnCanvasCtx;
  var w = 340, h = 48;
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#0a0f16';
  ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = 'rgba(35,134,54,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (var x = 0; x < w; x += 2) {
    var y = 24 + Math.sin(x * 0.05 + Date.now() * 0.001) * 5;
    if (x === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
}

function srnDrawWaveform() {
  if (!srnCanvasCtx || !srnAnalyser) {
    srnDrawWaveformIdle();
    return;
  }
  var ctx = srnCanvasCtx;
  var w = 340, h = 48;
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#0a0f16';
  ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = '#238636';
  ctx.lineWidth = 2;
  ctx.beginPath();
  var data = new Uint8Array(srnAnalyser.frequencyBinCount);
  srnAnalyser.getByteFrequencyData(data);
  var step = Math.floor(data.length / w);
  for (var x = 0; x < w; x++) {
    var val = data[Math.min(x * step, data.length - 1)] / 255;
    var y = 24 - val * 22;
    if (x === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
  if (srnPlaying) {
    requestAnimationFrame(srnDrawWaveform);
  } else {
    srnDrawWaveformIdle();
  }
}

function srnAnimarSenial() {
  setInterval(function() {
    if (!srnPanelOpen) return;
    var bars = document.querySelectorAll('.srn-signal-bar');
    if (!bars) return;
    for (var i = 0; i < bars.length; i++) {
      if (i < srnSignalLevel) {
        if (Math.random() > 0.7) {
          bars[i].classList.remove('lit');
          setTimeout(function() {
            bars[i].classList.add('lit');
          }, 100);
        }
      }
    }
  }, 2000);
}

function srnBindInterferenceEvents() {
  if (typeof dbRef !== 'undefined' && dbRef) {
    dbRef.child('partida/infortunios/eventosDisparados').on('value', function(snap) {
      var eventos = snap.val() || {};
      var guerra = eventos.us_inestabilidad || eventos.rub_colapso || eventos.rub_hegemon || eventos.cny_consolidacion;
      if (guerra) {
        srnActivarInterferencia('Evento geopolítico detectado');
        if (typeof agregarEvento === 'function') {
          agregarEvento('📻 SRN: Interferencia táctica activada por evento geopolítico.', 'info');
        }
      }
    });
  }
}
